<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 · Cenvero Fleet</title>
  <style>
    :root {
      --bg: #0a0e14;
      --card: rgba(18, 25, 38, 0.86);
      --text: #f4f7fb;
      --muted: #98a6bc;
      --accent: #00d4aa;
      --border: rgba(255, 255, 255, 0.08);
      --mono: "SFMono-Regular", "JetBrains Mono", ui-monospace, monospace;
      --sans: "Avenir Next", "Segoe UI", "Helvetica Neue", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, rgba(0, 212, 170, 0.14), transparent 40%),
        linear-gradient(180deg, #081018, #0a0e14);
      color: var(--text);
      font-family: var(--sans);
      padding: 24px;
    }
    .panel {
      width: min(720px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.25);
    }
    .code, h1 {
      font-family: var(--mono);
    }
    h1 {
      margin: 0;
      font-size: clamp(3rem, 10vw, 5.5rem);
      color: var(--accent);
    }
    p {
      color: var(--muted);
      line-height: 1.7;
      margin: 14px 0 24px;
    }
    pre {
      margin: 0 0 24px;
      padding: 18px 20px;
      border-radius: 18px;
      background: #09131e;
      border: 1px solid rgba(0, 212, 170, 0.18);
      overflow: auto;
      color: #defaf2;
      line-height: 1.7;
    }
    a {
      display: inline-block;
      padding: 14px 18px;
      border-radius: 14px;
      background: var(--accent);
      color: #03251d;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>404</h1>
    <p>This route isn’t in the fleet.</p>
<pre class="code">$ fleet server show the-page-you-asked-for
NAME:   the-page-you-asked-for
STATUS: NOT FOUND
MODE:   unknown</pre>
    <a href="/">Return to base</a>
  </main>
</body>
</html>
