name: Pages sync

on:
  schedule:
    - cron: '*/5 * * * *'

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages-deployment
  cancel-in-progress: false

jobs:
  sync:
    name: Sync Pages if version mismatch
    runs-on: ubuntu-latest
    steps:
      - name: Check version mismatch
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          live="$(curl -sf https://fleet.cenvero.org/manifest.json | jq -r '.channels.stable.version' 2>/dev/null || echo '')"
          latest="$(gh release list --repo ${{ github.repository }} --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || echo '')"
          echo "live=${live}"
          echo "latest=${latest}"
          if [ -z "${live}" ] || [ -z "${latest}" ]; then
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          elif [ "${live}" != "${latest}" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        if: steps.check.outputs.deploy == 'true'
        with:
          ref: main

      - uses: actions/configure-pages@v6
        if: steps.check.outputs.deploy == 'true'

      - uses: actions/upload-pages-artifact@v5
        if: steps.check.outputs.deploy == 'true'
        with:
          path: public

      - uses: actions/deploy-pages@v5
        if: steps.check.outputs.deploy == 'true'
