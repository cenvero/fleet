name: ci

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
      - name: gofmt check
        run: test -z "$(gofmt -l $(find . -name '*.go' -print))"
      - name: go vet
        run: go vet ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Test with race detector
        run: go test -race -cover ./...

  build-matrix:
    name: Build (${{ matrix.goos }} / ${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: arm
            goarm: "7"
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w -X github.com/cenvero/fleet/internal/version.Version=${GITHUB_REF_NAME:-dev}" -o "dist/fleet-${GOOS}-${GOARCH}" ./cmd/fleet
          go build -trimpath -ldflags="-s -w -X github.com/cenvero/fleet/internal/version.Version=${GITHUB_REF_NAME:-dev}" -o "dist/fleet-agent-${GOOS}-${GOARCH}" ./cmd/fleet-agent

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install scanners
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          go install github.com/securego/gosec/v2/cmd/gosec@latest
      - name: Run govulncheck
        run: govulncheck ./...
      - name: Run gosec
        run: gosec ./...

  manifest-validate:
    name: Validate manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON syntax
        run: jq empty public/manifest.json
      - name: Validate schema basics
        run: |
          jq -e '(.channels | has("stable") and has("beta") and has("alpha")) and (.binaries | type == "object") and (.agent_binaries | type == "object")' public/manifest.json >/dev/null
      - name: Validate release tooling
        run: ./scripts/test-release-tools.sh

  release-guardrails:
    name: Validate release guardrails
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate placeholder secret rejection
        env:
          MINISIGN_SECRET_KEY: bm90LWEtcmVhbC1zZWNyZXQ=
          MINISIGN_PASSWORD: test-password
          MINISIGN_PUBLIC_KEY: |
            untrusted comment: placeholder
            REPLACE_WITH_MINISIGN_PUBLIC_KEY
          RELEASE_BOT_TOKEN: test-token
        run: |
          if ./scripts/validate-release-env.sh; then
            echo "expected placeholder public key to be rejected" >&2
            exit 1
          fi

  deploy-pages:
    name: Deploy Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [manifest-validate]
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deployment
        uses: actions/deploy-pages@v4
